# Super App - Beta Environment (Fly.io)
# Deploy: fly deploy --config fly.beta.toml

app = "superapp-api-beta"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile.beta"

[env]
  NODE_ENV = "staging"
  PORT = "3000"
  TZ = "America/Sao_Paulo"
  LOG_LEVEL = "debug"
  
  # Beta-specific flags
  BETA_MODE = "true"
  ENABLE_SWAGGER = "true"
  ENABLE_DEBUG_ENDPOINTS = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[metrics]
  port = 3000
  path = "/metrics"
